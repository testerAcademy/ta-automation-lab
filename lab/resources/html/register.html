<div class="content-card">

    <h2>Registro de Usuario</h2>

    <form id="registerForm">

        <div class="form-group">
            <label for="language">Idioma</label>

            <select id="language" data-test="language">
                <option value="es">Español</option>
                <option value="en">English</option>
                <option value="pt">Português</option>
            </select>
        </div>


        <div class="form-group">
            <label for="firstName">Nombre *</label>

            <input
                    type="text"
                    id="firstName"
                    data-test="firstName"
                    placeholder="Ingresa tu nombre"
                    required>
        </div>


        <div class="form-group">
            <label for="lastName">Apellido paterno *</label>

            <input
                    type="text"
                    id="lastName"
                    data-test="lastName"
                    placeholder="Apellido paterno"
                    required>
        </div>


        <div class="form-group">
            <label for="motherLastName">Apellido materno</label>

            <input
                    type="text"
                    id="motherLastName"
                    data-test="motherLastName"
                    placeholder="Apellido materno">
        </div>


        <div class="form-group">
            <label for="email">Email *</label>

            <input
                    type="email"
                    id="email"
                    data-test="email"
                    placeholder="correo@email.com"
                    required>
        </div>


        <div class="form-group">
            <label for="phone">Teléfono</label>

            <input
                    type="tel"
                    id="phone"
                    data-test="phone"
                    placeholder="55 1234 5678">
        </div>


        <div class="form-group">
            <label for="password">Password *</label>

            <input
                    type="password"
                    id="password"
                    data-test="password"
                    placeholder="Password"
                    required>
        </div>


        <div class="form-group">
            <label for="confirmPassword">Confirmar Password *</label>

            <input
                    type="password"
                    id="confirmPassword"
                    data-test="confirmPassword"
                    placeholder="Confirmar password"
                    required>
        </div>


        <div class="form-group">
            <label for="country">País *</label>

            <select id="country" data-test="country" required>

                <option value="">Selecciona país</option>
                <option value="mx">México</option>
                <option value="co">Colombia</option>
                <option value="ar">Argentina</option>
                <option value="br">Brasil</option>
                <option value="us">Estados Unidos</option>

            </select>
        </div>


        <div class="form-group">

            <label>Género *</label>

            <label>
                <input type="radio" name="gender" value="male" data-test="genderMale">
                Hombre
            </label>

            <label>
                <input type="radio" name="gender" value="female" data-test="genderFemale">
                Mujer
            </label>

            <label>
                <input type="radio" name="gender" value="other" data-test="genderOther">
                Otro
            </label>

            <input
                    type="text"
                    id="genderDetail"
                    data-test="genderDetail"
                    placeholder="Especifica género"
                    style="display:none; margin-top:10px;">
        </div>


        <div class="form-group">
            <label for="comments">Comentarios</label>

            <textarea
                    id="comments"
                    data-test="comments"
                    placeholder="Comentarios"></textarea>
        </div>


        <div class="form-group">

            <label>

                <input
                        type="checkbox"
                        id="terms"
                        data-test="terms">

                Acepto términos y condiciones

            </label>

        </div>


        <button
                type="submit"
                class="btn-primary"
                id="btnRegister"
                data-test="registerButton">

            Registrar

        </button>


    </form>

    <div id="registerMessage"></div>

</div>
